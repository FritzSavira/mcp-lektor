services:
  mcp-server:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    restart: unless-stopped

  mcp-gui:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    command: ["streamlit", "run", "src/mcp_lektor/gui.py", "--server.address", "0.0.0.0"]
    restart: unless-stopped
