# Typografie-Regeln für deutsche Texte
rules:
  # --- Grundregeln ---
  - name: "Anführungszeichen öffnend"
    pattern: '(^|[\s(\[«])"'
    replacement: '\1„'
    explanation: 'Deutsche öffnende Anführungszeichen sind „ (unten).'
    category: "Anfuehrungszeichen"

  - name: "Anführungszeichen schließend"
    pattern: '([\w.,!?;:»])"'
    replacement: '\1“'
    explanation: 'Deutsche schließende Anführungszeichen sind “ (oben).'
    category: "Anfuehrungszeichen"

  - name: "Apostroph"
    pattern: "(?<=\\w)'(?=\\w)"
    replacement: "’"
    explanation: "Typografisch korrekter Apostroph ist ’."
    category: "Typografie"

  - name: "Gedankenstrich"
    pattern: " - "
    replacement: " – "
    explanation: "Im Deutschen wird der Halbgeviertstrich (–) als Gedankenstrich verwendet."
    category: "Typografie"

  - name: "Ellipse"
    pattern: '\.\.\.'
    replacement: "…"
    explanation: "Drei Punkte werden typografisch als Ellipsenzeichen (…) gesetzt."
    category: "Typografie"

  # --- Profi-Regeln (Ergänzt) ---
  - name: "Abkürzungen mit Leerzeichen"
    pattern: '\b(z|u|d|i|o)\.([BbAahRäv])\.'
    replacement: '\1. \2.'
    explanation: "Zwischen den Buchstaben von Abkürzungen (z. B., u. a., d. h.) gehört ein Leerzeichen."
    category: "Typografie"

  - name: "Leerzeichen vor Maßeinheiten"
    pattern: '(\d)(kg|cm|mm|km|ha|min|sec|m|g|l|t|h)\b'
    replacement: '\1 \2'
    explanation: "Zwischen einer Zahl und ihrer Maßeinheit muss ein Leerzeichen stehen."
    category: "Typografie"

  - name: "Leerzeichen vor Prozent"
    pattern: '(\d)%'
    replacement: '\1 %'
    explanation: "Vor dem Prozentzeichen gehört im Deutschen ein Leerzeichen."
    category: "Typografie"

  - name: "Bis-Strich"
    pattern: '(\d)-(\d)'
    replacement: '\1–\2'
    explanation: "In Zahlenbereichen (z. B. 10–12 Uhr) wird der Halbgeviertstrich (–) als Bis-Strich verwendet."
    category: "Typografie"
