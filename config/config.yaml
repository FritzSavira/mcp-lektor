# MCP Lektor – Server & API Configuration
server:
  host: "0.0.0.0"
  port: 8080
  log_level: "info"

proofreading:
  # Straico v.0 Mode: Use either smart_llm_selector OR llm_model
  smart_llm_selector: NULL
  # llm_model: "openai/gpt-4.1" #- sehr gut
  # llm_model: "nvidia/llama-3.3-nemotron-super-49b-v1.5" - nok
  llm_model: "claude-opus-4-5" # - ok
  # llm_model: "openai/gpt-4o-2024-11-20" - ok
  
  max_tokens_per_call: 4096
  temperature: 0.1
  author_name: "MCP Lektor"
  langdock_api_base: "https://api.langdock.com/openai/v1"
  
  # --- Logic Settings ---
  default_address_form: "Sie"
  red_threshold_r: 180
  red_threshold_gb: 80
  
  # --- Bible Validation ---
  bible_validation_base_url: "https://www.bibleserver.com"
  bible_validation_translation: "SLT"
  bible_validation_timeout_seconds: 10.0

  # Bibelserver Translations

  bible_translations:
    # Deutsche Übersetzungen
    LUT: { label: "Lutherbibel 2017", enabled: true }
    EU:  { label: "Einheitsübersetzung 2016", enabled: true }
    HFA: { label: "Hoffnung für Alle", enabled: true }
    NGÜ: { label: "Neue Genfer Übersetzung", enabled: true }
    GNB: { label: "Gute Nachricht Bibel", enabled: false }
    ELB: { label: "Elberfelder Bibel", enabled: false }
    NLB: { label: "Neues Leben Bibel", enabled: false }
    SLT: { label: "Schlachter 2000", enabled: false }
    ZB:  { label: "Zürcher Bibel", enabled: false }
    MENG: { label: "Menge Bibel", enabled: false }
    NeÜ: { label: "Neue evangelistische Übersetzung", enabled: false }
    BAS: { label: "BasisBibel", enabled: false }
    # Internationale Übersetzungen
    ESV: { label: "English Standard Version", enabled: false }
    NIV: { label: "New International Version", enabled: false }
    KJV: { label: "King James Version", enabled: false }
    NKJV: { label: "New King James Version", enabled: false }
    NLT: { label: "New Living Translation", enabled: false }
    NASB: { label: "New American Standard Bible", enabled: false }
    CSB: { label: "Christian Standard Bible", enabled: false }
    NRSV: { label: "New Revised Standard Version", enabled: false }
    TOB: { label: "Traduction Œcuménique de la Bible (FR)", enabled: false }
    NBS: { label: "Nouvelle Bible Segond (FR)", enabled: false }
    NBV: { label: "Nieuwe Bijbelvertaling (NL)", enabled: false }
    CEI: { label: "Conferenza Episcopale Italiana (IT)", enabled: false }
  
  # --- Robustness ---
  llm_max_retries: 3
  llm_retry_initial_delay_seconds: 2.0

session:
  ttl_minutes: 30
  cleanup_interval_seconds: 60
