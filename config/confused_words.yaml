# Verwechslungswörter – häufig verwechselte deutsche Wörter
# Format: word / confused_with / explanation / example_correct / example_incorrect
words:
  
  #- word: "das"
  #  confused_with: "dass"
  #  explanation: "'das' ist Artikel oder Relativpronomen, 'dass' ist Konjunktion."
  #  example_correct: "Ich weiß, dass das stimmt."
  #  example_incorrect: "Ich weiß, das das stimmt."
  
  - word: "seit"
    confused_with: "seid"
    explanation: "'seit' ist temporal (Präposition/Konjunktion), 'seid' ist 2. Person Plural von 'sein'."
    example_correct: "Seit wann seid ihr hier?"
    example_incorrect: "Seid wann seit ihr hier?"

  - word: "wider"
    confused_with: "wieder"
    explanation: "'wider' bedeutet 'gegen', 'wieder' bedeutet 'erneut'."
    example_correct: "Das widerspricht meiner Meinung. Komm bitte wieder."
    example_incorrect: "Das wiederspricht meiner Meinung."

  - word: "Tod"
    confused_with: "tot"
    explanation: "'Tod' ist das Substantiv, 'tot' ist das Adjektiv."
    example_correct: "Er ist tot. Der Tod kam plötzlich."
    example_incorrect: "Er ist Tod."

  - word: "anscheinend"
    confused_with: "scheinbar"
    explanation: "'anscheinend' = vermutlich wahr; 'scheinbar' = nur dem Anschein nach (tatsächlich nicht wahr)."
    example_correct: "Er ist anscheinend krank (= wahrscheinlich wirklich krank)."
    example_incorrect: "Er ist scheinbar krank (wenn er wirklich krank ist)."

  - word: "Gnade"
    confused_with: "Barmherzigkeit"
    explanation: "'Gnade' ist unverdiente Gunst Gottes; 'Barmherzigkeit' ist Mitleid und Erbarmen mit den Schwachen."
    example_correct: "Aus Gnade seid ihr errettet. Gott zeigte Barmherzigkeit mit den Leidenden."
    example_incorrect: "Aus Barmherzigkeit seid ihr errettet durch den Glauben."

  - word: "Heiligung"
    confused_with: "Heiligkeit"
    explanation: "'Heiligung' ist der Prozess des Heiligerwerdens; 'Heiligkeit' ist der Zustand/die Eigenschaft."
    example_correct: "Die Heiligung ist ein lebenslanger Prozess. Gottes Heiligkeit ist vollkommen."
    example_incorrect: "Die Heiligkeit ist ein lebenslanger Prozess."

  - word: "Rechtfertigung"
    confused_with: "Gerechtigkeit"
    explanation: "'Rechtfertigung' ist der Akt des Gerechtsprechens; 'Gerechtigkeit' ist die Eigenschaft/der Zustand."
    example_correct: "Die Rechtfertigung geschieht aus Glauben. Gottes Gerechtigkeit ist ewig."
    example_incorrect: "Die Gerechtigkeit geschieht aus Glauben allein."

  - word: "Versöhnung"
    confused_with: "Sühnung"
    explanation: "'Versöhnung' ist Wiederherstellung der Beziehung; 'Sühnung' ist die Tilgung der Schuld."
    example_correct: "Christus bewirkte Sühnung für unsere Sünden und Versöhnung mit Gott."
    example_incorrect: "Christus bewirkte Versöhnung für unsere Sünden am Kreuz."

  - word: "Offenbarung"
    confused_with: "Inspiration"
    explanation: "'Offenbarung' ist Gottes Selbstmitteilung; 'Inspiration' ist die göttliche Eingebung beim Schreiben der Schrift."
    example_correct: "Die Offenbarung Gottes geschah durch inspirierte Schreiber."
    example_incorrect: "Die Inspiration Gottes in der Natur ist allgemein sichtbar."

  - word: "Buße"
    confused_with: "Reue"
    explanation: "'Buße' ist Umkehr mit Sinnesänderung; 'Reue' ist das Bedauern der Sünde."
    example_correct: "Buße beinhaltet Reue und Umkehr. Reue allein rettet nicht."
    example_incorrect: "Judas tat Reue und wurde gerettet."

  - word: "Gemeinde"
    confused_with: "Kirche"
    explanation: "'Gemeinde' (ekklesia) ist die Versammlung der Gläubigen; 'Kirche' kann auch das Gebäude meinen."
    example_correct: "Die Gemeinde trifft sich im Kirchengebäude."
    example_incorrect: "Die Kirche Jesu besteht aus Steinen und Mörtel."

  - word: "Wiedergeburt"
    confused_with: "Bekehrung"
    explanation: "'Wiedergeburt' ist Gottes Werk der geistlichen Neuschöpfung; 'Bekehrung' ist die menschliche Antwort."
    example_correct: "Die Wiedergeburt bewirkt Gott, die Bekehrung vollzieht der Mensch."
    example_incorrect: "Der Mensch bewirkt seine eigene Wiedergeburt durch Bekehrung."
  
  - word: "erlösen"
    confused_with: "erretten"
    explanation: "'erlösen' betont den Loskauf/Freikauf; 'erretten' betont die Rettung vor Gefahr/Verderben."
    example_correct: "Christus erlöste uns durch sein Blut. Gott errettete uns vor dem ewigen Tod."
    example_incorrect: "Christus errettete uns durch den Preis seines Blutes."

  - word: "heiligen"
    confused_with: "weihen"
    explanation: "'heiligen' ist für Gott absondern/reinigen; 'weihen' ist feierlich Gott übergeben/widmen."
    example_correct: "Gott heiligt uns durch seinen Geist. Wir weihen ihm unser Leben."
    example_incorrect: "Wir heiligen Gott unser Leben im Gottesdienst."

  - word: "prüfen"
    confused_with: "versuchen"
    explanation: "'prüfen' ist testen zur Bewährung; 'versuchen' ist zum Bösen verleiten."
    example_correct: "Gott prüft uns. Der Satan versucht uns."
    example_incorrect: "Gott versucht Abraham mit der Opferung Isaaks."

  - word: "erwählen"
    confused_with: "berufen"
    explanation: "'erwählen' ist souveräne Auswahl; 'berufen' ist Ruf in den Dienst/zur Nachfolge."
    example_correct: "Gott erwählte uns vor Grundlegung der Welt und berief uns zur Heiligung."
    example_incorrect: "Gott berief uns vor Grundlegung der Welt."

  - word: "sündigen"
    confused_with: "fehlen"
    explanation: "'sündigen' ist bewusste Übertretung gegen Gott; 'fehlen' kann auch unabsichtliches Verfehlen sein."
    example_correct: "Wer sündigt, rebelliert gegen Gott. Alle haben gefehlt."
    example_incorrect: "David fehlte nur mit Bathseba."

  - word: "verkündigen"
    confused_with: "bezeugen"
    explanation: "'verkündigen' ist öffentliche Proklamation; 'bezeugen' ist persönliches Zeugnis geben."
    example_correct: "Paulus verkündigte das Evangelium und bezeugte seine Bekehrung."
    example_incorrect: "Petrus bezeugte das Evangelium von den Dächern."

  - word: "wandeln"
    confused_with: "folgen"
    explanation: "'wandeln' ist Lebensstil/Lebensführung; 'folgen' ist nachgehen/gehorchen."
    example_correct: "Wir wandeln im Geist und folgen Jesus nach."
    example_incorrect: "Die Jünger wandelten Jesus nach durch Galiläa."

  - word: "verherrlichen"
    confused_with: "ehren"
    explanation: "'verherrlichen' ist Gottes Herrlichkeit sichtbar machen; 'ehren' ist Respekt/Achtung erweisen."
    example_correct: "Unser Leben soll Gott verherrlichen. Wir ehren unsere Eltern."
    example_incorrect: "Wir verherrlichen unsere Eltern durch Gehorsam."

  - word: "Versuchung"
    confused_with: "Anfechtung"
    explanation: "'Versuchung' ist Verlockung zur Sünde (meist vom Teufel/Fleisch); 'Anfechtung' ist Prüfung des Glaubens (kann von Gott zugelassen sein)."
    example_correct: "Die Versuchung kam vom Teufel. Gott lässt Anfechtungen zu unserer Bewährung zu."
    example_incorrect: "Gott führte Jesus in die Versuchung in der Wüste."
 
  - word: "heilig"
    confused_with: "rein"
    explanation: "'heilig' ist für Gott abgesondert/geweiht; 'rein' ist frei von Unreinheit/Sünde."
    example_correct: "Gott ist heilig. Ein reines Herz ist frei von Sünde."
    example_incorrect: "Wir sollen ein heiliges Herz haben vor Menschen."

  - word: "gerecht"
    confused_with: "rechtschaffen"
    explanation: "'gerecht' ist vor Gott gerechtfertigt/im Recht; 'rechtschaffen' ist moralisch integer/aufrichtig."
    example_correct: "Durch Glauben werden wir gerecht. Hiob war rechtschaffen in seinem Wandel."
    example_incorrect: "Abraham war rechtschaffen vor Gott durch Glauben."

  - word: "selig"
    confused_with: "glücklich"
    explanation: "'selig' ist geistlich gesegnet/errettet; 'glücklich' ist irdisches Wohlbefinden."
    example_correct: "Selig sind die geistlich Armen. Glücklich ist, wer Freunde hat."
    example_incorrect: "Glücklich sind, die reinen Herzens sind."

  - word: "geistlich"
    confused_with: "geistig"
    explanation: "'geistlich' bezieht sich auf den Heiligen Geist; 'geistig' auf den menschlichen Verstand."
    example_correct: "Geistliche Gaben kommen vom Heiligen Geist. Geistige Fähigkeiten sind Verstandesgaben."
    example_incorrect: "Paulus hatte große geistige Gaben der Prophetie."

  - word: "fleischlich"
    confused_with: "leiblich"
    explanation: "'fleischlich' ist sündhaft/weltlich gesinnt; 'leiblich' bezieht sich auf den physischen Körper."
    example_correct: "Fleischliche Gesinnung ist Feindschaft gegen Gott. Leibliche Übung ist wenig nütze."
    example_incorrect: "Die fleischliche Auferstehung Jesu war real."

  - word: "ewige"
    confused_with: "unendlich"
    explanation: "'ewig' ist ohne Anfang und Ende (bei Gott) oder ohne Ende (beim Menschen); 'unendlich' ist grenzenlos/unbegrenzt."
    example_correct: "Das ewige Leben beginnt mit der Wiedergeburt. Gottes Macht ist unendlich."
    example_incorrect: "Gottes unendliches Leben hat keinen Anfang."

  - word: "auserwählt"
    confused_with: "berufen"
    explanation: "'auserwählt' ist von Gott vorherbestimmt; 'berufen' ist zum Dienst/Nachfolge gerufen."
    example_correct: "Die Auserwählten wurden vor Grundlegung der Welt bestimmt. Die Berufenen sollen ihrer Berufung würdig wandeln."
    example_incorrect: "Die berufenen Jünger wurden vor Grundlegung der Welt bestimmt."

  - word: "verdorben"
    confused_with: "gefallen"
    explanation: "'verdorben' ist moralisch korrupt/verderbt; 'gefallen' ist aus dem Stand der Unschuld gesunken."
    example_correct: "Die menschliche Natur ist verdorben. Der Mensch ist gefallen durch Adams Sünde."
    example_incorrect: "Die gefallene Natur des Menschen zeigt sich in bösen Taten."

  - word: "vollkommen"
    confused_with: "vollendet"
    explanation: "'vollkommen' ist ohne Fehler/perfekt; 'vollendet' ist abgeschlossen/zum Ziel gebracht."
    example_correct: "Gottes Wille ist vollkommen. Christus hat das Werk am Kreuz vollendet."
    example_incorrect: "Christus hat das vollkommene Werk am Kreuz getan."

  - word: "göttlich"
    confused_with: "himmlisch"
    explanation: "'göttlich' ist von Gottes Wesen/Natur; 'himmlisch' ist vom Himmel stammend/dort befindlich."
    example_correct: "Christus hat göttliche Natur. Wir haben eine himmlische Berufung."
    example_incorrect: "Wir empfangen göttliche Berufung vom Vater."